version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusedu-db
    environment:
      POSTGRES_USER: nexusedu_user
      POSTGRES_PASSWORD: nexusedu_password
      POSTGRES_DB: nexusedu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusedu_user -d nexusedu"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexusedu-mq
    environment:
      RABBITMQ_DEFAULT_USER: nexusedu_user
      RABBITMQ_DEFAULT_PASS: nexusedu_password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
